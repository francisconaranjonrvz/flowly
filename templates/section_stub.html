{% extends 'base_app.html' %}

{% block title %}{{ section_title }} — Flowly{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-16 text-center">
    <span class="material-symbols-outlined text-accent text-[56px] mb-4">{{ section_icon }}</span>
    <h1 class="font-display text-2xl md:text-3xl font-bold text-on-surface mb-2">{{ section_title }}</h1>
    <p class="text-on-surface-variant">{{ section_desc }}</p>
    <div class="mt-8 inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-surface-variant text-on-surface-variant text-xs font-display uppercase tracking-wider">
        <span class="material-symbols-outlined text-[16px]">schedule</span> Próximamente
    </div>
</div>
{% endblock %}
